name: Build & Release APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Generate release keystore
        run: |
          keytool -genkeypair \
            -alias release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore app/release.keystore \
            -storepass 'g@lapate13' \
            -keypass 'g@lapate13' \
            -dname "CN=HyperOS AAU, OU=Dev, O=Dev, L=Unknown, ST=Unknown, C=US"

      - name: Build signed release APK
        run: chmod +x gradlew && ./gradlew assembleRelease

      - name: Extract version name
        id: version
        run: |
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build.${{ github.run_number }}
          name: "Release v${{ steps.version.outputs.version }} (Build #${{ github.run_number }})"
          body: |
            Automated release from commit ${{ github.sha }}

            ### Changes
            ${{ github.event.head_commit.message }}
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
